<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLAR CALCULATOR — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="logo">SOLAR <span>CALCULATOR</span> &mdash; Admin</div>
    <nav>
      <a href="/">Calculadora</a>
    </nav>
  </header>

  <!-- Login -->
  <div class="admin-container" id="admin-login" style="display:block;">
    <div class="admin-login">
      <h2>Acceso Admin</h2>
      <div class="form-group">
        <input type="password" id="admin-pass" placeholder="Contrasena" onkeyup="if(event.key==='Enter') adminLogin()">
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">Ingresar</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-container" id="admin-panel" style="display:none;">

    <!-- Config -->
    <div class="config-form">
      <h3>Configuracion general</h3>
      <div class="input-row">
        <div class="form-group">
          <label>Tipo de cambio (ARS/USD)</label>
          <input type="number" id="cfg-dollar" step="0.1">
        </div>
        <div class="form-group">
          <label>Margen ganancia (%)</label>
          <input type="number" id="cfg-margin" step="1">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Eficiencia sistema (%)</label>
          <input type="number" id="cfg-efficiency" step="1">
        </div>
        <div class="form-group">
          <label>Instalacion base (USD)</label>
          <input type="number" id="cfg-install-base" step="10">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Instalacion por panel (USD)</label>
          <input type="number" id="cfg-install-panel" step="10">
        </div>
        <div class="form-group">
          <label>Inflacion tarifaria anual (%)</label>
          <input type="number" id="cfg-tariff-inflation" step="1" min="0" max="100">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Factor precio inyeccion (%)</label>
          <input type="number" id="cfg-injection-factor" step="1" min="0" max="100">
        </div>
        <div class="form-group">
          <label>Degradacion paneles (%/año)</label>
          <input type="number" id="cfg-degradation" step="0.1" min="0" max="5">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>WhatsApp Navimaq</label>
          <input type="text" id="cfg-whatsapp" placeholder="5491155881126">
        </div>
        <div class="form-group">
          <label>IA Facturas</label>
          <input type="text" id="cfg-gemini" value="Gemini Flash (server-side)" disabled style="opacity:0.6;">
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="saveAdminConfig()">Guardar configuracion</button>
    </div>

    <!-- Products -->
    <div class="config-form">
      <h3>Productos</h3>
      <div style="overflow-x:auto;">
        <table class="admin-table" id="products-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoria</th>
              <th>USD</th>
              <th>Flex USD</th>
              <th>IVA</th>
              <th>Watts</th>
              <th>Final ARS</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="products-tbody"></tbody>
        </table>
      </div>
      <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" onclick="showAddProduct()">+ Agregar producto</button>
        <button class="btn btn-secondary btn-sm" onclick="resetProducts()">Restaurar defaults</button>
        <button class="btn btn-secondary btn-sm" onclick="exportProducts()">Exportar JSON</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-file').click()">Importar JSON</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importProducts(event)">
      </div>
    </div>

    <!-- Calculador Pro -->
    <div class="config-form" style="border-color: var(--accent);">
      <h3 style="color:var(--accent);">Calculador Pro</h3>
      <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1rem;">Selecciona equipamiento especifico para armar presupuestos.</p>

      <div class="input-row">
        <div class="form-group">
          <label>Provincia</label>
          <select id="pro-province"></select>
        </div>
        <div class="form-group">
          <label>Consumo mensual (kWh)</label>
          <input type="number" id="pro-kwh" value="400" min="50" step="10">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Tarifa</label>
          <select id="pro-tariff"></select>
        </div>
        <div class="form-group">
          <label>Tipo de sistema</label>
          <select id="pro-system">
            <option value="ongrid">On-Grid</option>
            <option value="hybrid">Hibrido</option>
            <option value="offgrid">Off-Grid</option>
          </select>
        </div>
      </div>

      <hr style="border-color: var(--border); margin: 1rem 0;">

      <div class="input-row">
        <div class="form-group">
          <label>Panel solar</label>
          <select id="pro-panel"></select>
        </div>
        <div class="form-group">
          <label>Cant. paneles (0 = auto)</label>
          <input type="number" id="pro-num-panels" value="0" min="0" step="1">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Inversor</label>
          <select id="pro-inverter">
            <option value="">Automatico (segun kWp)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipo bateria</label>
          <select id="pro-battery">
            <option value="litio">Litio LiFePO4</option>
            <option value="plomo">Plomo-acido</option>
          </select>
        </div>
      </div>

      <hr style="border-color: var(--border); margin: 1rem 0;">

      <div>
        <label style="display:block; margin-bottom:0.5rem;"><strong>Estructuras</strong></label>
        <div id="pro-structures"></div>
        <button class="btn btn-secondary btn-sm" onclick="addStructureRow()" style="margin-top:0.5rem;">+ Agregar estructura</button>
      </div>

      <div style="margin-top:1.5rem; display:flex; gap:0.5rem;">
        <button class="btn btn-primary" onclick="runProCalc()">Calcular</button>
        <button class="btn btn-secondary" onclick="exportProPDF()">Exportar PDF</button>
      </div>

      <div id="pro-results" style="display:none; margin-top:1.5rem;"></div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="product-form" class="config-form" style="display:none;">
      <h3 id="product-form-title">Agregar producto</h3>
      <input type="hidden" id="pf-id">
      <div class="input-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="pf-name">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="pf-category">
            <option value="panel">Panel</option>
            <option value="inversor">Inversor On-Grid</option>
            <option value="inversor-hibrido">Inversor Hibrido</option>
            <option value="inversor-offgrid">Inversor Off-Grid</option>
            <option value="bateria">Bateria</option>
            <option value="estructura">Estructura</option>
            <option value="accesorio">Accesorio</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Descripcion</label>
        <input type="text" id="pf-desc">
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Precio USD (sin IVA)</label>
          <input type="number" id="pf-price" step="0.01">
        </div>
        <div class="form-group">
          <label>Precio Flex USD (sin IVA, 0 si no aplica)</label>
          <input type="number" id="pf-flex" step="0.01">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>IVA (%)</label>
          <input type="number" id="pf-iva" step="0.1" value="21">
        </div>
        <div class="form-group">
          <label>Watts</label>
          <input type="number" id="pf-watts">
        </div>
      </div>
      <div class="input-row">
        <div class="form-group">
          <label>Marca</label>
          <input type="text" id="pf-brand">
        </div>
        <div class="form-group">
          <label>Descuento contado (%)</label>
          <input type="number" id="pf-discount" step="1" value="15">
        </div>
      </div>
      <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
        <button class="btn btn-primary btn-sm" onclick="saveProduct()">Guardar</button>
        <button class="btn btn-secondary btn-sm" onclick="hideProductForm()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/js/data.js"></script>
  <script src="/js/calculator.js"></script>
  <script>
    const ADMIN_PASS = 'solarnav2026';

    function adminLogin() {
      if (document.getElementById('admin-pass').value === ADMIN_PASS) {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadAdmin();
      } else {
        alert('Contrasena incorrecta');
      }
    }

    function loadAdmin() {
      const cfg = getConfig();
      document.getElementById('cfg-dollar').value = cfg.dollarRate;
      document.getElementById('cfg-margin').value = Math.round((cfg.margin - 1) * 100);
      document.getElementById('cfg-efficiency').value = Math.round(cfg.efficiency * 100);
      document.getElementById('cfg-install-base').value = cfg.installBaseUSD;
      document.getElementById('cfg-install-panel').value = cfg.installPerPanelUSD;
      document.getElementById('cfg-tariff-inflation').value = Math.round((cfg.tariffInflation || 0.30) * 100);
      document.getElementById('cfg-injection-factor').value = Math.round((cfg.injectionPriceFactor || 0.50) * 100);
      document.getElementById('cfg-degradation').value = ((cfg.panelDegradation || 0.005) * 100).toFixed(1);
      document.getElementById('cfg-whatsapp').value = cfg.whatsappNumber || '5491155881126';
      renderProductTable();
      loadProSelectors();
    }

    function saveAdminConfig() {
      const cfg = getConfig();
      cfg.dollarRate = parseFloat(document.getElementById('cfg-dollar').value);
      cfg.margin = 1 + parseFloat(document.getElementById('cfg-margin').value) / 100;
      cfg.efficiency = parseFloat(document.getElementById('cfg-efficiency').value) / 100;
      cfg.installBaseUSD = parseFloat(document.getElementById('cfg-install-base').value);
      cfg.installPerPanelUSD = parseFloat(document.getElementById('cfg-install-panel').value);
      cfg.tariffInflation = parseFloat(document.getElementById('cfg-tariff-inflation').value) / 100;
      cfg.injectionPriceFactor = parseFloat(document.getElementById('cfg-injection-factor').value) / 100;
      cfg.panelDegradation = parseFloat(document.getElementById('cfg-degradation').value) / 100;
      cfg.whatsappNumber = document.getElementById('cfg-whatsapp').value.trim();
      saveConfig(cfg);

      alert('Configuracion guardada');
      renderProductTable();
    }

    function renderProductTable() {
      const tbody = document.getElementById('products-tbody');
      const products = getProducts();
      tbody.innerHTML = '';

      products.forEach(p => {
        const priceARS = calcFinalPriceARS(p);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.name}</td>
          <td>${p.category}</td>
          <td>${formatUSD(p.priceUSD)}</td>
          <td>${p.flexPriceUSD ? formatUSD(p.flexPriceUSD) : '-'}</td>
          <td>${(p.iva * 100).toFixed(1)}%</td>
          <td>${p.watts || '-'}</td>
          <td style="color:var(--gold)">${formatARS(priceARS)}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="editProduct(${p.id})" style="padding:0.3rem 0.5rem;">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})" style="padding:0.3rem 0.5rem;">X</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function showAddProduct() {
      document.getElementById('product-form').style.display = 'block';
      document.getElementById('product-form-title').textContent = 'Agregar producto';
      document.getElementById('pf-id').value = '';
      document.getElementById('pf-name').value = '';
      document.getElementById('pf-desc').value = '';
      document.getElementById('pf-price').value = '';
      document.getElementById('pf-flex').value = '';
      document.getElementById('pf-iva').value = '21';
      document.getElementById('pf-watts').value = '';
      document.getElementById('pf-brand').value = '';
      document.getElementById('pf-discount').value = '15';
    }

    function editProduct(id) {
      const products = getProducts();
      const p = products.find(x => x.id === id);
      if (!p) return;

      document.getElementById('product-form').style.display = 'block';
      document.getElementById('product-form-title').textContent = 'Editar producto';
      document.getElementById('pf-id').value = p.id;
      document.getElementById('pf-name').value = p.name;
      document.getElementById('pf-category').value = p.category;
      document.getElementById('pf-desc').value = p.description;
      document.getElementById('pf-price').value = p.priceUSD;
      document.getElementById('pf-flex').value = p.flexPriceUSD || '';
      document.getElementById('pf-iva').value = (p.iva * 100).toFixed(1);
      document.getElementById('pf-watts').value = p.watts || '';
      document.getElementById('pf-brand').value = p.brand || '';
      document.getElementById('pf-discount').value = (p.cashDiscount || 0) * 100;
    }

    function hideProductForm() {
      document.getElementById('product-form').style.display = 'none';
    }

    function saveProduct() {
      const products = getProducts();
      const id = document.getElementById('pf-id').value;
      const flexVal = parseFloat(document.getElementById('pf-flex').value);

      const product = {
        id: id ? parseInt(id) : Date.now(),
        category: document.getElementById('pf-category').value,
        name: document.getElementById('pf-name').value,
        description: document.getElementById('pf-desc').value,
        priceUSD: parseFloat(document.getElementById('pf-price').value),
        flexPriceUSD: flexVal > 0 ? flexVal : null,
        iva: parseFloat(document.getElementById('pf-iva').value) / 100,
        watts: parseInt(document.getElementById('pf-watts').value) || null,
        brand: document.getElementById('pf-brand').value,
        cashDiscount: parseFloat(document.getElementById('pf-discount').value) / 100,
      };

      if (id) {
        const idx = products.findIndex(p => p.id === parseInt(id));
        if (idx >= 0) products[idx] = product;
      } else {
        products.push(product);
      }

      saveProducts(products);
      renderProductTable();
      hideProductForm();
    }

    function deleteProduct(id) {
      if (!confirm('Eliminar este producto?')) return;
      const products = getProducts().filter(p => p.id !== id);
      saveProducts(products);
      renderProductTable();
    }

    function resetProducts() {
      if (!confirm('Restaurar productos a los valores por defecto? Se perderan los cambios.')) return;
      localStorage.removeItem('solarnav_products');
      renderProductTable();
    }

    function exportProducts() {
      const products = getProducts();
      const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'solar-nav-products.json';
      a.click();
    }

    function importProducts(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const products = JSON.parse(e.target.result);
          if (Array.isArray(products)) {
            saveProducts(products);
            renderProductTable();
            alert('Productos importados: ' + products.length);
          } else {
            alert('Formato invalido');
          }
        } catch {
          alert('Error al leer el archivo');
        }
      };
      reader.readAsText(file);
    }

    // ====== CALCULADOR PRO ======
    function loadProSelectors() {
      const products = getProducts();
      const cfg = getConfig();

      // Provincias
      const provSel = document.getElementById('pro-province');
      provSel.innerHTML = '';
      PROVINCES.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id; opt.textContent = p.name + ' (HSP ' + p.hsp + ')';
        provSel.appendChild(opt);
      });

      // Tarifas
      const tarSel = document.getElementById('pro-tariff');
      tarSel.innerHTML = '';
      TARIFFS.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id; opt.textContent = t.name;
        tarSel.appendChild(opt);
      });

      // Paneles
      const panelSel = document.getElementById('pro-panel');
      panelSel.innerHTML = '';
      products.filter(p => p.category === 'panel').sort((a, b) => b.watts - a.watts).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.watts + 'W — ' + p.brand + ' — ' + formatUSD(p.priceUSD) + ' (' + formatARS(calcFinalPriceARS(p)) + ')';
        panelSel.appendChild(opt);
      });

      // Inversores (todos los tipos)
      const invSel = document.getElementById('pro-inverter');
      invSel.innerHTML = '<option value="">Automatico (segun kWp)</option>';
      products.filter(p => (p.category === 'inversor' || p.category === 'inversor-offgrid' || p.category === 'inversor-hibrido') && p.watts)
        .sort((a, b) => a.watts - b.watts).forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          const cat = p.category === 'inversor' ? 'On-Grid' : p.category === 'inversor-hibrido' ? 'Hibrido' : 'Off-Grid';
          opt.textContent = (p.watts >= 1000 ? (p.watts/1000) + 'kW' : p.watts + 'W') + ' ' + p.brand + ' — ' + cat + ' — ' + formatUSD(p.priceUSD) + ' (' + formatARS(calcFinalPriceARS(p)) + ')';
          invSel.appendChild(opt);
        });
    }

    let structureRowCount = 0;
    function addStructureRow() {
      const products = getProducts();
      const structures = products.filter(p => p.category === 'estructura');
      const container = document.getElementById('pro-structures');
      const rowId = 'str-row-' + (structureRowCount++);

      const row = document.createElement('div');
      row.id = rowId;
      row.style.cssText = 'display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem; flex-wrap:wrap;';

      let opts = '<option value="">Seleccionar...</option>';
      structures.forEach(s => {
        opts += '<option value="' + s.id + '">' + s.name + ' — ' + formatUSD(s.priceUSD) + ' (' + formatARS(calcFinalPriceARS(s)) + ')</option>';
      });

      row.innerHTML = '<select class="str-select" style="flex:1; min-width:200px;">' + opts + '</select>'
        + '<input type="number" class="str-qty" value="1" min="1" style="width:60px;">'
        + '<button class="btn btn-danger btn-sm" onclick="document.getElementById(\'' + rowId + '\').remove()" style="padding:0.2rem 0.5rem;">X</button>';

      container.appendChild(row);
    }

    function getStructureItems() {
      const items = [];
      document.querySelectorAll('#pro-structures > div').forEach(row => {
        const sel = row.querySelector('.str-select');
        const qty = row.querySelector('.str-qty');
        if (sel && sel.value && qty) {
          items.push({ id: parseInt(sel.value), qty: parseInt(qty.value) || 1 });
        }
      });
      return items;
    }

    function runProCalc() {
      const panelId = parseInt(document.getElementById('pro-panel').value);
      const invVal = document.getElementById('pro-inverter').value;
      const numPanels = parseInt(document.getElementById('pro-num-panels').value) || 0;
      const structureItems = getStructureItems();

      const params = {
        provinceId: document.getElementById('pro-province').value,
        monthlyKwh: parseFloat(document.getElementById('pro-kwh').value) || 400,
        tariffId: document.getElementById('pro-tariff').value,
        systemType: document.getElementById('pro-system').value,
        batteryType: document.getElementById('pro-battery').value,
        panelId: panelId || null,
        inverterId: invVal ? parseInt(invVal) : null,
        numPanelsOverride: numPanels > 0 ? numPanels : null,
        structureItems: structureItems.length > 0 ? structureItems : null,
      };

      const r = calculateSolar(params);
      if (r.error) { alert(r.error); return; }

      renderProResults(r);
    }

    function renderProResults(r) {
      const div = document.getElementById('pro-results');
      div.style.display = 'block';

      const row = (label, val) => '<div style="display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid var(--border);"><span>' + label + '</span><strong>' + val + '</strong></div>';

      let html = '<h4 style="color:var(--accent); margin-bottom:0.5rem;">Resultado</h4>';

      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.5rem;margin-bottom:1rem;">';
      html += '<div style="background:var(--surface);padding:0.75rem;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;color:var(--accent);">' + r.systemKwp.toFixed(2) + '</div><div style="font-size:0.75rem;color:var(--text-muted);">kWp</div></div>';
      html += '<div style="background:var(--surface);padding:0.75rem;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;color:var(--accent);">' + r.numPanels + '</div><div style="font-size:0.75rem;color:var(--text-muted);">Paneles</div></div>';
      html += '<div style="background:var(--surface);padding:0.75rem;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;color:var(--gold);">' + formatARS(r.totalCostARS) + '</div><div style="font-size:0.75rem;color:var(--text-muted);">Costo total</div></div>';
      html += '<div style="background:var(--surface);padding:0.75rem;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;color:var(--accent);">' + r.coveragePercent.toFixed(0) + '%</div><div style="font-size:0.75rem;color:var(--text-muted);">Cobertura</div></div>';
      html += '</div>';

      html += '<h4 style="margin:1rem 0 0.5rem;">Equipamiento</h4>';
      html += row('Panel', r.selectedPanel + ' (' + r.panelWatts + 'W) x' + r.numPanels);
      html += row('Paneles', formatARS(r.panelCostARS));

      if (r.selectedInverters.length) {
        r.selectedInverters.forEach(inv => {
          html += row('Inversor', inv.name + ' (' + inv.watts + 'W) x' + inv.qty);
          html += row('Inversores', formatARS(inv.priceARS));
        });
      }

      if (r.structureDetail && r.structureDetail.length > 0) {
        html += '<h4 style="margin:1rem 0 0.5rem;">Estructuras (detalle)</h4>';
        r.structureDetail.forEach(s => {
          html += row(s.name + ' x' + s.qty, formatARS(s.totalARS));
        });
        html += row('Subtotal estructuras', formatARS(r.structureCostARS));
      } else {
        html += row('Estructura (estimado ' + Math.round(getConfig().structurePercent * 100) + '%)', formatARS(r.structureCostARS));
      }

      if (r.batteryCount > 0) {
        html += row('Bateria', r.selectedBattery + ' x' + r.batteryCount);
        html += row('Baterias', formatARS(r.batteryCostARS));
      }

      html += row('Instalacion', formatARS(r.installCostARS));
      html += '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-top:2px solid var(--accent);margin-top:0.5rem;font-size:1.1rem;"><strong>TOTAL</strong><strong style="color:var(--gold);">' + formatARS(r.totalCostARS) + '</strong></div>';

      html += '<h4 style="margin:1rem 0 0.5rem;">Generacion y ahorro</h4>';
      html += row('Generacion mensual', Math.round(r.monthlyGenerationKwh) + ' kWh');
      html += row('Generacion anual', Math.round(r.annualGenerationKwh) + ' kWh');
      html += row('Ahorro mensual', formatARS(r.monthlySavingsARS));
      html += row('Ahorro anual', formatARS(r.annualSavingsARS));
      if (r.excessMonthlyKwh > 0) html += row('Excedente mensual', Math.round(r.excessMonthlyKwh) + ' kWh');
      html += row('Payback', r.paybackYears < 99 ? r.paybackYears + ' años' : 'N/A');
      html += row('ROI 25 años', r.roi25years.toFixed(0) + '%');
      html += row('Factura antes', formatARS(r.monthlyBillBefore) + '/mes');
      html += row('Factura despues', formatARS(r.monthlyBillAfter) + '/mes');
      html += row('Reduccion', r.billReductionPct.toFixed(0) + '%');

      div.innerHTML = html;
    }

    function exportProPDF() {
      const div = document.getElementById('pro-results');
      if (div.style.display === 'none') { alert('Primero calcula un presupuesto'); return; }
      window.print();
    }
  </script>
</body>
</html>
